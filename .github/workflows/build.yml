name: Build String Finder
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile
        run: cl.exe /EHsc /W3 main.cpp /Fe:StringFinder.exe user32.lib advapi32.lib

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: StringFinder-Build
          path: StringFinder.exe
